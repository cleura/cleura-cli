# Example GitLab CI job authenticating with the cleura CLI.
#
# CI/CD variables (Settings > CI/CD > Variables):
#   CLEURA_USERNAME       (protected)
#   CLEURA_API_PASSWORD   (protected + masked) — read by `cleura login`
#   CLEURA_PROJECT_ID     (protected)
#
# The golang image below installs the CLI with `go install`; you can instead
# download a prebuilt binary from the GitHub Releases.

cleura-example:
  stage: deploy
  image: golang:1.25
  before_script:
    - go install github.com/cleura/cleura-cli/cmd/cleura@latest
    - export PATH="$PATH:$(go env GOPATH)/bin"
    # CLEURA_API_PASSWORD is picked up from the environment — no prompt, no pipe.
    - cleura login -u "$CLEURA_USERNAME" --profile ci --cloud public --region sto1 --project-id "$CLEURA_PROJECT_ID"
  script:
    - cleura whoami
    - cleura gardener shoot list
  after_script:
    # Runs on success and failure: revoke the job's token.
    - cleura logout --profile ci -q
