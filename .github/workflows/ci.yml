name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
      - name: command reference is up to date
        run: |
          make docs
          git diff --exit-code -- docs/reference \
            || { echo "::error::docs/reference is stale — run 'make docs' and commit the result"; exit 1; }

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: check # validate .goreleaser.yaml without releasing
